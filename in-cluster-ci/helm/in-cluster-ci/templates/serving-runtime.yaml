apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  name: llamacpp-runtime
spec:
  supportedModelFormats:
    - name: gguf
      version: "1"
  containers:
    - name: kserve-container
      image: ghcr.io/ggml-org/llama.cpp:server
      args:
        - "--hf-repo"
        - "{{ .Values.model.repo }}"
        - "--hf-file"
        - "{{ .Values.model.file }}"
        - "--port"
        - "8080"
        - "--host"
        - "0.0.0.0"
        - "--threads"
        - "{{ .Values.model.threads }}"
        - "--ctx-size"
        - "4096"
        - "--chat-template"
        - "chatml"
      ports:
        - containerPort: 8080
          protocol: TCP
      env:
        - name: HOME
          value: /tmp
        - name: HF_HOME
          value: /tmp/hf_home
        - name: LLAMA_CACHE
          value: /tmp/llama_cache
      volumeMounts:
        - name: tmp-dir
          mountPath: /tmp
      resources:
        {{- toYaml .Values.model.resources | nindent 8 }}
  volumes:
    - name: tmp-dir
      emptyDir: {}
