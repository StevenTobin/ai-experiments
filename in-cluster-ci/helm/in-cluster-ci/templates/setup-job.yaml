apiVersion: batch/v1
kind: Job
metadata:
  name: submit-analyzer-pipeline-run-2
  annotations:
    # Run this after the configmap and RBAC are created
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "5"
spec:
  backoffLimit: {{ .Values.setupJob.backoffLimit }}
  template:
    spec:
      serviceAccountName: in-cluster-ci-setup
      restartPolicy: OnFailure
      containers:
        - name: kfp-compiler
          image: {{ .Values.setupJob.image }}
          command: ["/bin/bash", "-c"]
          args:
            - |
              echo "Reconstructing Python package structure..."
              mkdir -p /tmp/workspace/components
              cp /src/collect.py /tmp/workspace/components/
              cp /src/run_health_check.py /tmp/workspace/components/
              cp /src/analyze.py /tmp/workspace/components/
              cp /src/report.py /tmp/workspace/components/
              cp /src/pipeline.py /tmp/workspace/
              
              cd /tmp/workspace
              
              echo "Installing requirements..."
              pip install --quiet kfp kubernetes requests
              
              echo "Compiling pipeline..."
              python pipeline.py
              
              echo "Submitting pipeline to ODH Data Science Pipelines..."
              # In ODH, the DSP API is typically exposed via a service in the user namespace
              # or accessible via port-forward. For in-cluster, we hit the ml-pipeline service.
              
              cat << 'EOF' > submit.py
              import os
              import time
              from kfp.client import Client
              
              # DSPA in ODH exposes ml-pipeline.NAMESPACE.svc.cluster.local:8888
              DSP_NAMESPACE = "{{ .Values.pipeline.namespace }}"
              KFP_ENDPOINT = f"http://ds-pipeline-ds-pipeline.{DSP_NAMESPACE}.svc.cluster.local:8888"
              
              print(f"Connecting to KFP at {KFP_ENDPOINT}")
              
              # Retry loop for connection
              client = None
              for i in range(10):
                  try:
                      client = Client(host=KFP_ENDPOINT)
                      break
                  except Exception as e:
                      print(f"Waiting for DSP API... ({i}/10): {e}")
                      time.sleep(10)
                      
              if not client:
                  print("Failed to connect to Data Science Pipelines API")
                  exit(1)
                  
              pipeline_name = "{{ .Values.pipeline.name }}"
              pipeline_package_path = "analyzer_pipeline.yaml"
              
              # Upload pipeline
              try:
                  # Check if it exists first to avoid duplicates
                  existing = client.get_pipeline(pipeline_name)
                  if existing:
                      print(f"Pipeline {pipeline_name} already exists. Creating new version.")
                      # Note: v2 SDK version handling varies; simple upload might fail if name exists
                      # For robustness in a hook, we just create a run from the local yaml.
              except Exception:
                  pass
                  
              print("Creating a scheduled run...")
              # We use KFP Client to create a recurring run
              try:
                  client.create_recurring_run(
                      experiment_id=client.create_experiment("CI Health Analyzer").experiment_id,
                      job_name=f"{pipeline_name}-schedule",
                      cron_expression="{{ .Values.pipeline.schedule }}",
                      pipeline_package_path=pipeline_package_path,
                      enable_caching=False
                  )
                  print("Scheduled run created successfully!")
                  
                  # Create an immediate run as well
                  client.create_run_from_pipeline_package(
                      pipeline_file=pipeline_package_path,
                      arguments={},
                      run_name=f"{pipeline_name}-manual-trigger",
                      experiment_name="CI Health Analyzer"
                  )
                  print("Immediate run triggered!")
                  
              except Exception as e:
                  print(f"Error submitting run: {e}")
                  exit(1)
              EOF
              
              python submit.py
          volumeMounts:
            - name: source-code
              mountPath: /src
      volumes:
        - name: source-code
          configMap:
            name: pipeline-source
