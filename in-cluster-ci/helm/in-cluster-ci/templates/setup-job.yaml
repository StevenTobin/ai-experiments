apiVersion: batch/v1
kind: Job
metadata:
  name: submit-analyzer-pipeline-run-5
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  backoffLimit: {{ .Values.setupJob.backoffLimit }}
  template:
    spec:
      serviceAccountName: in-cluster-ci-setup
      restartPolicy: OnFailure
      containers:
        - name: kfp-compiler
          image: {{ .Values.setupJob.image }}
          command: ["/bin/bash", "-c"]
          args:
            - |
              echo "Reconstructing Python package structure..."
              mkdir -p /tmp/workspace/components
              cp /src/collect.py /tmp/workspace/components/
              cp /src/run_health_check.py /tmp/workspace/components/
              cp /src/analyze.py /tmp/workspace/components/
              cp /src/report.py /tmp/workspace/components/
              cp /src/pipeline.py /tmp/workspace/
              
              cd /tmp/workspace
              
              echo "Installing requirements..."
              pip install --quiet kfp kubernetes requests
              
              echo "Compiling pipeline..."
              python pipeline.py
              
              echo "Submitting pipeline to ODH Data Science Pipelines..."
              
              cat << 'PYEOF' > submit.py
              import os
              import time
              import urllib3
              from kfp.client import Client
              
              urllib3.disable_warnings(urllib3.exceptions.InsecureRequestWarning)
              
              DSP_NAMESPACE = os.environ.get("DSP_NAMESPACE", "in-cluster-ci")
              
              # Read the SA token for kube-rbac-proxy authentication
              with open("/var/run/secrets/kubernetes.io/serviceaccount/token") as f:
                  sa_token = f.read().strip()
              
              # Must use HTTPS port 8443 (kube-rbac-proxy) with bearer token
              KFP_ENDPOINT = f"https://ds-pipeline-ds-pipeline.{DSP_NAMESPACE}.svc.cluster.local:8443"
              
              print(f"Connecting to KFP at {KFP_ENDPOINT}")
              
              client = None
              for i in range(30):
                  try:
                      client = Client(
                          host=KFP_ENDPOINT,
                          existing_token=sa_token,
                          ssl_sa_cert=False,
                      )
                      health = client.get_healthy()
                      print(f"Connected to KFP successfully! Health: {health}")
                      break
                  except Exception as e:
                      print(f"Waiting for DSP API... ({i}/30): {e}")
                      time.sleep(10)
              
              if not client:
                  print("Failed to connect to Data Science Pipelines API")
                  exit(1)
              
              pipeline_name = os.environ.get("PIPELINE_NAME", "odh-analyzer-pipeline")
              pipeline_package_path = "analyzer_pipeline.yaml"
              
              print("Creating experiment and submitting pipeline...")
              try:
                  experiment = client.create_experiment("CI Health Analyzer")
                  
                  client.create_recurring_run(
                      experiment_id=experiment.experiment_id,
                      job_name=f"{pipeline_name}-schedule",
                      cron_expression=os.environ.get("PIPELINE_SCHEDULE", "0 0 * * *"),
                      pipeline_package_path=pipeline_package_path,
                      enable_caching=False
                  )
                  print("Scheduled run created successfully!")
                  
                  client.create_run_from_pipeline_package(
                      pipeline_file=pipeline_package_path,
                      arguments={},
                      run_name=f"{pipeline_name}-manual-trigger",
                      experiment_name="CI Health Analyzer"
                  )
                  print("Immediate run triggered!")
                  
              except Exception as e:
                  print(f"Error submitting pipeline: {e}")
                  exit(1)
              PYEOF
              
              DSP_NAMESPACE="{{ .Values.pipeline.namespace }}" \
              PIPELINE_NAME="{{ .Values.pipeline.name }}" \
              PIPELINE_SCHEDULE="{{ .Values.pipeline.schedule }}" \
              python submit.py
          volumeMounts:
            - name: source-code
              mountPath: /src
      volumes:
        - name: source-code
          configMap:
            name: pipeline-source
