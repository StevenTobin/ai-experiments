apiVersion: batch/v1
kind: Job
metadata:
  name: upload-analyzer-pipeline
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: in-cluster-ci-setup
      volumes:
        - name: pipeline-spec
          configMap:
            name: analyzer-pipeline-spec
      containers:
        - name: upload
          image: registry.access.redhat.com/ubi9/python-311:latest
          volumeMounts:
            - name: pipeline-spec
              mountPath: /pipeline
              readOnly: true
          command:
            - python3
            - -c
            - |
              import urllib.request
              import urllib.error
              import json
              import time
              import hashlib

              DSP_API = "http://ds-pipeline-ds-pipeline.{{ .Values.pipeline.namespace }}.svc.cluster.local:8888"
              PIPELINE_NAME = "{{ .Values.pipeline.name }}"
              PIPELINE_FILE = "/pipeline/analyzer_pipeline.yaml"

              def wait_for_api(max_retries=30, delay=10):
                  for i in range(max_retries):
                      try:
                          req = urllib.request.Request(f"{DSP_API}/apis/v2beta1/pipelines")
                          urllib.request.urlopen(req, timeout=5)
                          print("DSP API is ready")
                          return True
                      except Exception as e:
                          print(f"Waiting for DSP API ({i+1}/{max_retries}): {e}")
                          time.sleep(delay)
                  return False

              def find_existing_pipeline():
                  req = urllib.request.Request(f"{DSP_API}/apis/v2beta1/pipelines")
                  resp = urllib.request.urlopen(req, timeout=10)
                  data = json.loads(resp.read())
                  for p in data.get("pipelines", []):
                      if p.get("display_name") == PIPELINE_NAME:
                          return p["pipeline_id"]
                  return None

              def create_pipeline():
                  body = json.dumps({
                      "display_name": PIPELINE_NAME,
                      "description": "Collects ODH logs, runs health check, analyzes with a local LLM, and generates a health report."
                  }).encode()
                  req = urllib.request.Request(
                      f"{DSP_API}/apis/v2beta1/pipelines",
                      data=body,
                      headers={"Content-Type": "application/json"},
                      method="POST"
                  )
                  resp = urllib.request.urlopen(req, timeout=10)
                  data = json.loads(resp.read())
                  print(f"Created pipeline: {data['pipeline_id']}")
                  return data["pipeline_id"]

              def get_spec_hash():
                  with open(PIPELINE_FILE, "rb") as f:
                      return hashlib.sha256(f.read()).hexdigest()[:12]

              def get_existing_versions(pipeline_id):
                  req = urllib.request.Request(f"{DSP_API}/apis/v2beta1/pipelines/{pipeline_id}/versions?pageSize=100")
                  resp = urllib.request.urlopen(req, timeout=10)
                  data = json.loads(resp.read())
                  return data.get("pipeline_versions", [])

              def upload_version(pipeline_id, version_name):
                  boundary = "----PipelineUploadBoundary"
                  with open(PIPELINE_FILE, "rb") as f:
                      file_data = f.read()

                  body = (
                      f"--{boundary}\r\n"
                      f'Content-Disposition: form-data; name="uploadfile"; filename="analyzer_pipeline.yaml"\r\n'
                      f"Content-Type: application/x-yaml\r\n\r\n"
                  ).encode() + file_data + f"\r\n--{boundary}--\r\n".encode()

                  req = urllib.request.Request(
                      f"{DSP_API}/apis/v2beta1/pipelines/upload_version?name={version_name}&pipelineid={pipeline_id}",
                      data=body,
                      headers={"Content-Type": f"multipart/form-data; boundary={boundary}"},
                      method="POST"
                  )
                  resp = urllib.request.urlopen(req, timeout=30)
                  data = json.loads(resp.read())
                  print(f"Uploaded version '{version_name}': {data.get('pipeline_version_id', 'unknown')}")
                  return data

              if not wait_for_api():
                  print("ERROR: DSP API did not become ready")
                  exit(1)

              pipeline_id = find_existing_pipeline()
              if not pipeline_id:
                  pipeline_id = create_pipeline()

              spec_hash = get_spec_hash()
              version_name = f"v-{spec_hash}"
              existing = get_existing_versions(pipeline_id)
              if any(v.get("display_name") == version_name for v in existing):
                  print(f"Version '{version_name}' already exists, nothing to do")
              else:
                  upload_version(pipeline_id, version_name)
                  print("Pipeline uploaded successfully!")
