apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-pipeline-upload
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  podSelector:
    matchLabels:
      app: ds-pipeline-ds-pipeline
      component: data-science-pipelines
  ingress:
    - from:
        - podSelector:
            matchLabels:
              job-name: upload-analyzer-pipeline
      ports:
        - port: 8888
          protocol: TCP
