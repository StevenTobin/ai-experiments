apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: analyzer-llm
  annotations:
    serving.kserve.io/deploymentMode: RawDeployment
spec:
  predictor:
    minReplicas: 1
    model:
      modelFormat:
        name: vllm
      runtime: vllm-runtime
      # Remove storageUri so KServe doesn't try to attach a model-dir volume,
      # and instead lets vllm pull from HuggingFace via the --model flag.
      resources:
        {{- toYaml .Values.model.resources | nindent 8 }}