apiVersion: v1
kind: ServiceAccount
metadata:
  name: in-cluster-ci-setup
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "0"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: in-cluster-ci-setup-role
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "0"
rules:
  - apiGroups: ["kubeflow.org"]
    resources: ["pipelines", "experiments", "runs", "recurringruns"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  - apiGroups: ["datasciencepipelinesapplications.opendatahub.io"]
    resources: ["datasciencepipelinesapplications"]
    verbs: ["get", "list", "watch"]
    resourceNames: ["ds-pipeline"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: in-cluster-ci-pipeline-reader
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "events", "resourcequotas", "namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["datasciencecluster.opendatahub.io"]
    resources: ["datascienceclusters"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["dscinitialization.opendatahub.io"]
    resources: ["dscinitializations"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["operators.coreos.com"]
    resources: ["subscriptions", "clusterserviceversions"]
    verbs: ["get", "list"]
  - apiGroups: ["components.opendatahub.io"]
    resources: ["*"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: in-cluster-ci-setup-binding
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "0"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: in-cluster-ci-setup-role
subjects:
  - kind: ServiceAccount
    name: in-cluster-ci-setup
    namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: in-cluster-ci-pipeline-runner-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: in-cluster-ci-pipeline-reader
subjects:
  - kind: ServiceAccount
    name: pipeline-runner-ds-pipeline
    namespace: {{ .Values.pipeline.namespace }}
