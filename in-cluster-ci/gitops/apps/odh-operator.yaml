apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: odh-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: "https://github.com/opendatahub-io/odh-gitops.git" # Assuming you want to use upstream, or replace with your fork
    targetRevision: main
    path: operator/base
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-operators
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true