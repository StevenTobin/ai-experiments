apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bootstrap-in-cluster-ci
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: "https://github.com/StevenTobin/ai-experiments.git" # Replaced placeholder with your repo URL
    targetRevision: main
    path: in-cluster-ci/gitops/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true