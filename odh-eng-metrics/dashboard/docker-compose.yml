networks:
  default:
  ci-obs:
    external: true
    name: openshift-ci-observability_default

services:
  exporter:
    image: python:3.12-slim
    working_dir: /app
    command: >-
      sh -c "apt-get update -qq && apt-get install -y -qq git >/dev/null 2>&1
      && pip install -q -r requirements.txt && python3 cli.py serve"
    volumes:
      - ..:/app:z

  prometheus:
    image: prom/prometheus:v2.53.3
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro,z
    depends_on:
      - exporter

  grafana:
    image: grafana/grafana:11.4.0
    ports:
      - "3001:3000"
    networks:
      - default
      - ci-obs
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/overview/eng-overview.json
      GF_INSTALL_PLUGINS: victoriametrics-logs-datasource,yesoreyeram-infinity-datasource
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro,z
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro,z
    depends_on:
      - prometheus
