upstream:
  owner: opendatahub-io
  repo: opendatahub-operator
  clone_url: https://github.com/opendatahub-io/opendatahub-operator.git
  branches:
    main: main
    stable: stable
    downstream_staging: rhoai
  tags:
    release_pattern: 'v\d+\.\d+\.\d+$'
    ea_pattern: 'v\d+\.\d+\.\d+-ea\.\d+$'
    patch_pattern: 'v\d+\.\d+\.[1-9]\d*$'

downstream:
  owner: red-hat-data-services
  repo: rhods-operator
  clone_url: https://github.com/red-hat-data-services/rhods-operator.git
  branches:
    main: main
    release_pattern: 'rhoai-\d+\.\d+$'
    ea_pattern: 'rhoai-\d+\.\d+-ea\.\d+$'
  bot_pr_prefixes:
    - "chore(deps):"

jira:
  enabled: false
  project: RHOAIENG
  issue_pattern: 'RHOAIENG-\d+'

per_release:
  min_version: "3.0.0"

collection:
  lookback_days: 365
  data_dir: data
  cache_db: data/dora.sqlite
